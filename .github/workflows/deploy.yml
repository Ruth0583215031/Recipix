jobs:
deploy:
runs-on: ubuntu-latest
steps:
- name: Deploy to Server via SSH
[cite_start]uses: appleboy/ssh-action@v0.1.10 [cite: 37, 92]
with:
    host: ${{ secrets.RECIPIX_SERVER_IP }}
    username: ${{ secrets.RECIPIX_SERVER_USER }}
    key: ${{ secrets.RECIPIX_SSH_KEY }}
    script: |
    cd ~/Recipix [cite: 44, 99]
    git pull origin main # וודאי שזה שם הבראנץ' הנכון

    # עדכון Backend
    source venv/bin/activate
    pip install -r requirements.txt

    # עדכון Frontend
    cd client
    npm install
    npm run build --configuration=production

    # אתחול השרתים ב-Screen
    screen -S backend -X quit || true
    screen -dmS backend python3 app.py

    screen -S frontend -X quit || true
    screen -dmS frontend ng serve --host 0.0.0.0 --port 4200